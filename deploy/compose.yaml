services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CLERK_ISSUER_URL: ${CLERK_ISSUER_URL:?CLERK_ISSUER_URL is required}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:?CLERK_AUDIENCE is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
        VITE_API_BASE_URL: ""
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
